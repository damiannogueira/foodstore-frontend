<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Store | Catálogo</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <header class="app-header">
  <div class="container header-content">

    <div class="brand">
      <img src="/src/assets/logo-foodStore.png" alt="Food Store" class="brand-logo">
      <h1 class="app-title">Food Store</h1>
    </div>

    <nav class="nav-links">
      <a class="link" href="./home.html">Inicio</a>
      <a class="link" href="../cart/cart.html">Carrito <span id="cartCount">0</span></a>
      <a class="link" href="../../client/orders/orders.html">Mis pedidos</a>
      <button class="btn btn-small" id="logoutBtn">Cerrar sesión</button>
    </nav>

  </div>
</header>

  <main class="container store-layout">
    <aside class="card sidebar">
      <h2 class="section-title">Categorías</h2>
      <button class="btn" id="allCategoriesBtn">Todas</button>
      <div id="categoriesList" class="category-list"></div>
    </aside>

    <section class="content">
      <div class="card toolbar">
        <input class="input" id="searchInput" type="text" placeholder="Buscar producto..." />

        <select class="input" id="sortSelect">
          <option value="">Ordenar</option>
          <option value="nameAsc">Nombre A-Z</option>
          <option value="nameDesc">Nombre Z-A</option>
          <option value="priceAsc">Precio menor a mayor</option>
          <option value="priceDesc">Precio mayor a menor</option>
        </select>
      </div>

      <p id="productsCounter" class="products-counter"></p>

      <div id="productsGrid" class="products-grid"></div>
    </section>
  </main>

  <script type="module" src="./home.ts"></script>
</body>
</html>
