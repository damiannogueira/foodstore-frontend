<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Food Store | Registro</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>

  <main class="page-center">
    <section class="card auth-card">

      <img src="/src/assets/logo-foodStore.png" alt="Food Store" class="logo-img">

      <h1 class="title">Crear cuenta</h1>
      <p class="subtitle">Registrate para continuar</p>

      <form id="registerForm" class="auth-form">

        <input class="input" id="nombre" type="text" placeholder="Nombre" required />
        <input class="input" id="apellido" type="text" placeholder="Apellido" required />
        <input class="input" id="email" type="email" placeholder="Email" required />
        <input class="input" id="celular" type="text" placeholder="Celular" required />
        <input class="input" id="password" type="password" placeholder="Contraseña" required />

        <button class="btn" type="submit">Registrarse</button>

      </form>

      <p id="mensaje" class="message"></p>

      <p class="auth-link">
        ¿Ya tenés cuenta?
        <a class="link" href="../login/login.html">Iniciar sesión</a>
      </p>

    </section>
  </main>

  <script type="module" src="./register.ts"></script>
</body>
</html>
