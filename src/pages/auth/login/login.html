<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Store | Login</title>
  <link rel="stylesheet" href="../../../style.css" />
</head>
<body>
  <main class="auth-container">
    <section class="auth-card">
      <h1>Food Store</h1>
      <p>Iniciá sesión para continuar</p>

      <form id="loginForm" class="auth-form">
        <label for="email">Email</label>
        <input id="email" type="email" required placeholder="usuario@email.com" />

        <label for="password">Contraseña</label>
        <input id="password" type="password" required placeholder="Tu contraseña" />

        <button type="submit">Ingresar</button>
      </form>

      <p id="loginMessage" class="message"></p>

      <p class="auth-link">
        ¿No tenés cuenta?
        <a href="../register/register.html">Registrate</a>
      </p>
    </section>
  </main>

  <script type="module" src="./login.ts"></script>
</body>
</html>
