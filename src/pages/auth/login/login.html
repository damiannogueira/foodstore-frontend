<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Store | Login</title>

  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <main class="page-center">
    <section class="card auth-card">
      <img src="/src/assets/logo-foodStore.png" alt="Food Store" class="logo-img">
      <h1 class="title">Food Store</h1>
      <p class="subtitle">Iniciá sesión para continuar</p>

      <form id="loginForm" class="auth-form">

        <div class="form-group">
          <label for="email">Email</label>
          <input 
            class="input"
            id="email" 
            type="email" 
            required 
            placeholder="usuario@email.com" 
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            class="input"
            id="password" 
            type="password" 
            required 
            placeholder="Tu contraseña" 
          />
        </div>

        <button class="btn" type="submit">Ingresar</button>

      </form>

      <p id="loginMessage" class="message"></p>

      <p class="auth-link">
        ¿No tenés cuenta?
        <a class="link" href="../register/register.html">Registrate</a>
      </p>

    </section>
  </main>

  <script type="module" src="./login.ts"></script>
</body>
</html>
