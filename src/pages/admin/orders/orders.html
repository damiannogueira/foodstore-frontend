<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Food Store | Admin Pedidos</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <header class="app-header">
    <div class="container header-content">
      <div class="brand">
        <img src="/src/assets/logo-foodStore.png" alt="Food Store" class="brand-logo">
        <h1 class="app-title">Gestión de Pedidos</h1>
      </div>

      <nav class="nav-links">
        <a class="link" href="../adminHome/adminHome.html">Dashboard</a>
        <a class="link" href="../categories/categories.html">Categorías</a>
        <a class="link" href="../products/products.html">Productos</a>
        <button class="btn btn-small" id="logoutBtn">Cerrar sesión</button>
      </nav>
    </div>
  </header>

  <main class="container admin-layout">
    <section class="card">
      <h2 class="section-title">Pedidos</h2>

      <div class="toolbar">
        <select class="input" id="estadoFiltro">
          <option value="">Todos</option>
          <option value="PENDIENTE">Pendiente</option>
          <option value="CONFIRMADO">Confirmado</option>
          <option value="EN_PREPARACION">En preparación</option>
          <option value="ENVIADO">Enviado</option>
          <option value="ENTREGADO">Entregado</option>
          <option value="TERMINADO">Terminado</option>
          <option value="CANCELADO">Cancelado</option>
        </select>
      </div>

      <section id="ordersList" class="admin-orders-list"></section>
      <p id="message" class="message"></p>
    </section>
  </main>

  <script type="module" src="./orders.ts"></script>
</body>
</html>
