<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Food Store | Productos</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <header class="app-header">
    <div class="container header-content">
      <div class="brand">
        <img src="/src/assets/logo-foodStore.png" alt="Food Store" class="brand-logo">
        <h1 class="app-title">Gestión de Productos</h1>
      </div>

      <nav class="nav-links">
        <a class="link" href="../adminHome/adminHome.html">Volver</a>
      </nav>
    </div>
  </header>

  <main class="container admin-layout">
    <section class="card">
      <div class="admin-section-header">
        <h2 class="section-title">Productos</h2>
        <button class="btn btn-small" id="newProductBtn">Nuevo producto</button>
      </div>

      <section id="productsList" class="admin-products-list"></section>
    </section>

    <section id="formContainer" class="card admin-form-card hidden">
      <h2 id="formTitle" class="section-title">Nuevo producto</h2>

      <form id="productForm" class="admin-form">
        <input id="productId" type="hidden" />

        <input class="input" id="nombre" placeholder="Nombre" required />
        <textarea class="input textarea" id="descripcion" placeholder="Descripción" required></textarea>

        <input class="input" id="precio" type="number" placeholder="Precio" required />
        <input class="input" id="stock" type="number" placeholder="Stock" required />

        <select class="input" id="categoriaId"></select>

        <input class="input" id="imagen" placeholder="URL imagen" required />

        <label class="checkbox-row">
          <input id="disponible" type="checkbox" />
          Disponible
        </label>

        <div class="form-actions">
          <button class="btn btn-small" type="submit">Guardar</button>
          <button class="btn btn-secondary btn-small" type="button" id="cancelBtn">Cancelar</button>
        </div>
      </form>
    </section>

    <p id="message" class="message"></p>
  </main>

  <script type="module" src="./products.ts"></script>
</body>
</html>
